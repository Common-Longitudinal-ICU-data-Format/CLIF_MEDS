subject_id_col: patient_id

labs:
  lab:
    code:
      - LAB
      - col(lab_category)
      - col(reference_unit)
      - col(lab_order_category)
    time: col(lab_collect_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: lab_value_numeric
    text_value: lab_value
    hospitalization_id: hospitalization_id
