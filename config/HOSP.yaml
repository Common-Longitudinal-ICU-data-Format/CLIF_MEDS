subject_id_col: patient_id

hospitalization:
  admission:
    code: HOSP//admission_type//UNK//text
    time: col(admission_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    text_value: admission_type_category
    hospitalization_id: hospitalization_id
    age_at_admission: age_at_admission

  discharge:
    code: HOSP//discharge_category//UNK//text
    time: col(discharge_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    text_value: discharge_category
    hospitalization_id: hospitalization_id
