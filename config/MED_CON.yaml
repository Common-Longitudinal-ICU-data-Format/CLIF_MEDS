elf_version: "1.0.0"
subject_id_col: patient_id

medication_admin_continuous:
  medication:
    code:
      - MED_CON
      - col(med_category)
      - col(med_dose_unit_converted)
      - col(mar_action_category)
    time: col(admin_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: med_dose_converted
    med_dose_unit: med_dose_unit
    med_route_category: med_route_category
    hospitalization_id: hospitalization_id

    unit_conversion:
      enabled: true
      override: true
      allow_other_meds: false
      preferred_units:
        acetaminophen: mg/min
        albumin_infusion: ml/hr
        alteplase: mg/hr
        aminocaproic: g/hr
        aminophylline: mg/kg/hr
        amiodarone: mg/min
        angiotension: ng/kg/min
        argatroban: mcg/kg/min
        bivalirudin: mg/kg/hr
        bumetanide: mg/hr
        cisatracurium: mcg/kg/min
        clevidipine: mg/hr
        dexmedetomidine: mcg/kg/hr
        dextrose: ml/hr
        dextrose_in_water_d5w: ml/hr
        diltiazem: mg/hr
        dobutamine: mcg/kg/min
        dopamine: mcg/kg/min
        epinephrine: mcg/kg/min
        epoprostenol: ng/kg/min
        eptifibatide: mcg/kg/min
        esmolol: mcg/kg/min
        fentanyl: mcg/kg/hr
        furosemide: mg/hr
        heparin: u/hr
        hydromorphone: mg/hr
        insulin: u/hr
        ketamine: mcg/kg/hr
        labetalol: mg/min
        lidocaine: mg/min
        lorazepam: mg/hr
        magnesium: g/hr
        midazolam: mg/hr
        milrinone: mcg/kg/min
        morphine: mg/hr
        naloxone: mg/hr
        nicardipine: mg/hr
        nitroglycerin: mcg/kg/min
        nitroprusside: mcg/kg/min
        norepinephrine: mcg/kg/min
        octreotide: mcg/hr
        pantoprazole: mg/hr
        pentobarbital: mcg/kg/hr
