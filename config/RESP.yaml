subject_id_col: patient_id

respiratory_support:
  # --- Categorical concepts (3) ---
  device_category:
    code: RESP//device_category//NA//NA
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    text_value: device_category
    hospitalization_id: hospitalization_id

  mode_category:
    code: RESP//mode_category//NA//NA
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    text_value: mode_category
    hospitalization_id: hospitalization_id

  tracheostomy:
    code: RESP//tracheostomy//presence//NA
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
    numeric_value: tracheostomy
    hospitalization_id: hospitalization_id

  # --- Set parameters (10) ---
  fio2_set:
    code: RESP//fio2//%//set
    time: col(recorded_dttm)
    time_format: "%Y-%m-%d %H:%M:%S"
